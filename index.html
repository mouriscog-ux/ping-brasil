<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brasileirão Ping Pong Ultimate</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- O Menu Principal agora é a primeira tela visível para evitar travamentos -->
        <section id="main-menu" class="screen">
            <h1 class="ultimate-title">ULTIMATE BR</h1>
            <p class="ultimate-sub">CHAMPIONSHIP EDITION</p>
            <button onclick="showScreen('team-selection')" class="btn-ultimate">Iniciar Desafio</button>
        </section>

        <!-- Seleção de Time -->
        <section id="team-selection" class="screen" style="display: none;">
            <h2 class="section-title">SELECIONE SEU CLUBE</h2>
            <div id="teams-grid"></div>
            <div class="selection-controls">
                <div class="difficulty-box">
                    <span>NÍVEL DA IA</span>
                    <select id="difficulty-level">
                        <option value="normal">AMADOR</option>
                        <option value="hard">PROFISSIONAL</option>
                        <option value="super-hard">LENDÁRIO</option>
                    </select>
                </div>
                <button id="start-btn" disabled class="btn-ultimate">Jogar Agora</button>
            </div>
        </section>

        <!-- Arena de Jogo (Totalmente Centralizada) -->
        <section id="game-screen" class="screen" style="display: none;">
            <div id="hud">
                <div class="score-board">
                    <div class="team-block">
                        <img id="player-shield" src="" alt="">
                        <span id="player-points">0</span>
                    </div>
                    <div class="vs-divider">VS</div>
                    <div class="team-block">
                        <span id="ai-points">0</span>
                        <img id="ai-shield" src="" alt="">
                    </div>
                </div>
                <div id="match-phase">OITAVAS DE FINAL</div>
            </div>

            <div id="viewport">
                <canvas id="gameCanvas"></canvas>
            </div>

            <div class="controls-legend">⬅️➡️ LATERAIS | ⬆️ AVANÇAR | ⬇️ RECUAR</div>
        </section>
    </div>

    <!-- Script carregado de forma assíncrona para não travar a UI -->
    <script src="game.js" async></script>
</body>
</html>
